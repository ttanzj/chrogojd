name: Docker Build & Push to GHCR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 🔥 关键权限设置
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chrogojd:latest
            ghcr.io/${{ github.repository_owner }}/chrogojd:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      packages: write

    steps:
      - name: Keep only the 3 most recent tagged versions
        uses: snok/container-retention-policy@v2
        with:
          account_type: personal          # 改成 organization 如果是组织仓库
          token: ${{ secrets.GITHUB_TOKEN }}
          keep-n-most-recent: 3
          image-tags: latest              # 只针对有 latest 的版本进行保留排序
