name: Docker Build & Push to GHCR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chrogojd:latest
            ghcr.io/${{ github.repository_owner }}/chrogojd:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      packages: write  # delete 需要 write 权限

    steps:
      - name: Keep only the 3 most recent versions + clean old untagged/sha
        uses: snok/container-retention-policy@v3  # 升级到 v3
        with:
          account: user  # 或 organization + org-name: your-org
          token: ${{ secrets.GITHUB_TOKEN }}  # 如果过滤不准，建议换成 PAT（见下面）
          image-names: chrogojd  # 只针对这个镜像（仓库 owner 自动加 ghcr.io/.../ 前缀）
          # image-tags: "*"      # 如果想覆盖所有 tag（包括 sha tag），加这个
          cut-off: 14 days ago   # 必须！超过 14 天才考虑删除（可调小如 7 days ago）
          keep-n-most-recent: 3  # 只保留 tagged 的最近 3 个（按创建/更新时间）
          timestamp-to-use: created_at  # 建议用 created_at，更稳定（不会因 re-tag 刷新）
          tag-selection: both    # both = tagged + untagged 都处理（推荐）
          dry-run: true          # 先开 true，看日志确认要删什么，再改 false
          rust-log: debug        # 详细日志，便于 debug
